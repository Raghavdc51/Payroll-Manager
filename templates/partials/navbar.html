{% load static %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container-fluid">
        <!-- ✅ Brand & Logo -->
        <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}">
        <img src="{% static 'myapp/logo.png' %}" alt="Logo" style="height: 36px;" class="me-2">
        <strong>Payroll Manager</strong>
        </a>

        <div class="collapse navbar-collapse justify-content-end">
        <ul class="navbar-nav align-items-center">
            
            {% comment %} <!-- ✅ HR-specific Nav Link -->
            {% if role == 'hr' %}
            <li class="nav-item">
            <a class="nav-link" href="{% url 'manage_employees' %}">Employees</a>
            </li>
            {% endif %} {% endcomment %}

            <!-- ✅ Authenticated User Info -->
            {% if request.user.is_authenticated %}
            <li class="nav-item">
            <span class="nav-link text-light">Hi, {{ request.user.username }}</span>
            </li>

            <!-- ✅ Logout Button using GET-safe custom view -->
            <li class="nav-item">
            <a class="nav-link text-warning" href="{% url 'logout' %}">Logout</a>
            </li>
            {% endif %}
        </ul>
        </div>
    </div>
